<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Examples</title>
</head>
<body>
<div th:if="${name != null}">
    <p>Hello, <span style="color:red" th:text="${name}"></span></p>
</div>

<!-- итерация по списку  -->
<ul>
    <li th:each="piglet : ${departments}" th:text="${piglet}"></li>
</ul>

<!--Вставку значения из объекта -->
<p th:text="${name}"></p>
<p th:text="${user.email}"></p>

<!-- объект формы-->
<form th:object="${user}" th:action="@{/example/save}" th:method="post">
    <input type="text" placeholder="Name" th:field="*{name}">
    <input type="email" placeholder="Email" th:field="*{email}">
    <button type="submit">Save</button>
</form>

<!--Вставка фрагментов-->
<div th:insert="~{example/fragments/header :: header}"></div>
<div th:insert="~{example/fragments/footer :: footer}"></div>
</body>
</html>
